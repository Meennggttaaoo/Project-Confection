           <svg viewBox="0 0 64 48" className={className}>

         const [selectedProject, setSelectedProject] = useState(null);
         const [activeStage, setActiveStage] = useState(null);

               .pixel-btn-shadow:active { box-shadow: 0px 0px 0px 0px rgba(0,0,0,0); transform: translate(6px, 6px); }

               .pixel-float { animation: pixel-float 2s steps(4) infinite; }
               .sugar-path { filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1)); }

               .pixel-scroll::-webkit-scrollbar-track { background: #fdf2f8; border-left: 2px solid black; }

                   <span className="text-[10px] text-center leading-relaxed font-bold">{p.label}</span>

               <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                 <path d="M 100,500 L 250,500 L 250,300 L 450,300 L 450,450 L 650,450 L 650,200 L 850,200 L 850,400 L 1100,400" fill="none" stroke="#fff" strokeWidth="40" style={{ strokeLinejoin: 'miter' }} />
                 <path d="M 100,500 L 250,500 L 250,300 L 450,300 L 450,450 L 650,450 L 650,200 L 850,200 L 850,400 L 1100,400" fill="none" stroke="#ffccf9" strokeWidth="10" strokeDasharray="15 15" style={{ strokeLinejoin: 'miter' }} />
               </svg>
               {STAGES.map((stage) => (
                 <div key={stage.id} style={{ left: stage.pos.x, top: stage.pos.y }} className="absolute transform -translate-x-1/2 -translate-y-1/2 z-20 group cursor-pointer" onClick={() => onStageClick(stage)}>
                   <div className="flex flex-col items-center">
                     <div className="mb-2 bg-black text-white text-[7px] px-2 py-1 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pixel-border">{stage.name}</div>
                     <div className="w-16 h-16 pixel-float" style={{ animationDelay: `${stage.id * 0.2}s` }}>
                       {renderIcon(stage.type, "w-full h-full drop-shadow-[4px_4px_0px_rgba(0,0,0,0.15)]")}
                     </div>
                   </div>
                 </div>
               ))}
               <div className="absolute bottom-10 left-10 text-[10px] text-[#ff61d8] font-bold">START!</div>
               <div className="absolute top-16 right-10 text-[10px] text-[#00d2ff] font-bold animate-pulse">FINISH!!</div>
             </div>
           </div>
         );
       }


       function Modal({ stage, projectId, onClose }) {
         const content = (JOURNEY_DATA[projectId] && JOURNEY_DATA[projectId][stage.id]) ? JOURNEY_DATA[projectId][stage.id] : JOURNEY_DATA.default;
         const renderIcon = (type, className) => {
           switch(type) {
             case 'cookie': return <PixelCookie className={className} />;
             case 'candy': return <PixelCandy className={className} />;
             case 'chocolate': return <PixelChocolate className={className} />;
             case 'lollipop': return <PixelLollipop className={className} />;
             case 'cupcake': return <PixelCupcake className={className} />;
             default: return null;
           }
         };


         return (
           <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#ff61d8]/20 backdrop-blur-sm">
             <div className="bg-white w-full max-w-lg border-4 border-black pixel-btn-shadow relative overflow-hidden flex flex-col max-h-[85vh]">
               <div className="shrink-0 h-2 flex"><div className="flex-1 bg-[#ff61d8]"></div><div className="flex-1 bg-[#00d2ff]"></div><div className="flex-1 bg-[#ffcc00]"></div><div className="flex-1 bg-[#4dfa75]"></div></div>
               <button onClick={onClose} className="absolute top-6 right-6 text-black hover:text-[#ff61d8] z-10"><i data-lucide="x"></i></button>
               <div className="shrink-0 p-8 pb-4 flex items-center gap-6 border-b-4 border-gray-100">
                 <div className="w-20 h-20 shrink-0">{renderIcon(stage.type, "w-full h-full")}</div>
                 <div>
                   <div className="text-[8px] text-[#ff61d8] mb-2 uppercase font-bold tracking-widest">Stage {stage.id}</div>
                   <h2 className="text-sm text-[#333] leading-relaxed uppercase">{stage.name}</h2>
                 </div>
               </div>
               <div className="flex-1 overflow-y-auto p-8 pt-6 space-y-8 pixel-scroll">
                 <section>
                   <h3 className="text-[10px] text-[#00d2ff] mb-3 uppercase font-bold">Objectives</h3>
                   <p className="text-[9px] leading-loose text-gray-500 uppercase">{content.objectives}</p>
                 </section>
                 <section>
                   <h3 className="text-[10px] text-[#4dfa75] mb-3 uppercase font-bold">Key Activities</h3>
                   <div className="space-y-3">
                     {content.activities.map((act, i) => (
                       <div key={i} className="flex items-start gap-3 text-[8px] text-gray-700 bg-gray-50 p-2 border-2 border-gray-100">
                         <span className="text-[#ff61d8] font-bold shrink-0">{">"}</span> {act.toUpperCase()}
                       </div>
                     ))}
                   </div>
                 </section>
                 <section>
                   <h3 className="text-[10px] text-[#ff61d8] mb-3 uppercase font-bold">Outputs</h3>
                   <div className="space-y-3">
                     {content.outputs.map((out, i) => (
                       <div key={i} className="flex items-start gap-3 text-[8px] text-gray-700 bg-pink-50/30 p-2 border-2 border-pink-100">
                         <span className="text-[#00d2ff] font-bold shrink-0">[*]</span> {out.toUpperCase()}
                       </div>
                     ))}
                   </div>
                 </section>
               </div>
               <div className="shrink-0 p-8 pt-0">
                 <button onClick={onClose} className="w-full py-4 bg-[#ffcc00] border-4 border-black pixel-btn-shadow text-[10px] text-black font-bold uppercase hover:bg-yellow-300">[ CONTINUE QUEST ]</button>
               </div>
             </div>
           </div>
         );
       }


       const root = ReactDOM.createRoot(document.getElementById('root'));
       root.render(<App />);
   </script>
</body>
</html>
